<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>B2Travel – Your Memory Universe</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            background-color: #05111f;
            font-family: sans-serif;
        }

        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #05111f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #00B9F1;
        }

        #loading-overlay h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        #loading-bar-wrap {
            width: 260px;
            height: 6px;
            background: #0a2035;
            border-radius: 3px;
            overflow: hidden;
        }

        #loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0770E3, #00B9F1);
            border-radius: 3px;
            transition: width .3s;
        }

        #loading-status {
            margin-top: .75rem;
            font-size: .8rem;
            opacity: .7;
        }

        /* Error banner */
        #error-banner {
            display: none;
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #c0392b;
            color: #fff;
            padding: .55rem 1.2rem;
            border-radius: 8px;
            font-size: .85rem;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <!-- Loading overlay -->
    <div id="loading-overlay">
        <h2>✈️ B2Travel – Loading your memories…</h2>
        <div id="loading-bar-wrap">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-status">Connecting to backend…</div>
    </div>

    <div id="error-banner"></div>

    <a-scene background="color: #05111f" cursor="rayOrigin: mouse" raycaster="objects: .interactive">
        <a-camera position="0 0 0" look-controls="pointerLockEnabled: false">

            <a-entity cursor="fuse: true; fuseTimeout: 1500" position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.02"
                material="color: #0770E3; shader: flat"
                animation__mouseenter="property: scale; to: 1.5 1.5 1.5; startEvents: mouseenter; dur: 200"
                animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
                animation__color_enter="property: material.color; type: color; to: #00B9F1; startEvents: mouseenter; dur: 200"
                animation__color_leave="property: material.color; type: color; to: #0770E3; startEvents: mouseleave; dur: 200">
            </a-entity>

            <!-- 8-direction guide arrows -->
            <a-entity id="arrow-top" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="0 0.35 -1" visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-top-right" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="0.32 0.25 -1" rotation="0 0 -45"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-right" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="0.45 0 -1" rotation="0 0 -90"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-bottom-right" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="0.32 -0.18 -1" rotation="0 0 -135"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-bottom" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="0 -0.25 -1" rotation="0 0 180"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-bottom-left" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="-0.32 -0.18 -1" rotation="0 0 135"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-left" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="-0.45 0 -1" rotation="0 0 90"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
            <a-entity id="arrow-top-left" geometry="primitive: triangle" scale="0.2 0.08 1"
                material="color: #00FFFF; shader: flat; transparent: true" position="-0.32 0.25 -1" rotation="0 0 45"
                visible="false"
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>

            <!-- HUD container fixed to the user's view -->
            <a-entity id="hud-container"></a-entity>
        </a-camera>

        <a-entity id="gallery-container"></a-entity>
    </a-scene>

    <script>
        // ── CONFIG ──────────────────────────────────────────────────────────────────
        // Custom component to force UI to render strictly on top of EVERYTHING
        AFRAME.registerComponent('render-top', {
            init: function () {
                const apply = () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh) {
                        mesh.renderOrder = 9999;
                        mesh.material.depthTest = false;
                        mesh.material.depthWrite = false;
                    }
                };
                this.el.addEventListener('loaded', apply);
                apply();
            }
        });

        // Change this if your backend runs on a different host/port
        const BACKEND = 'https://platter-wackiness-swiftly.ngrok-free.dev';

        // Scale factor: UMAP coordinates are usually in [-5, 5].
        // We multiply to spread photos across the VR space.
        const UMAP_SCALE = 4.0;

        // ── UI helpers ──────────────────────────────────────────────────────────────
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingBar = document.getElementById('loading-bar');
        const loadingStatus = document.getElementById('loading-status');
        const errorBanner = document.getElementById('error-banner');

        function setProgress(pct, msg) {
            loadingBar.style.width = pct + '%';
            loadingStatus.textContent = msg;
        }
        function showError(msg) {
            errorBanner.textContent = '⚠ ' + msg;
            errorBanner.style.display = 'block';
            setTimeout(() => { errorBanner.style.display = 'none'; }, 6000);
        }

        // ── Scene setup ──────────────────────────────────────────────────────────────
        const sceneEl = document.querySelector('a-scene');
        const assetsEl = document.createElement('a-assets');
        assetsEl.setAttribute('timeout', '30000');
        sceneEl.prepend(assetsEl);

        const galleryEl = document.getElementById('gallery-container');
        const selectedPhotos = [];

        // ── Starfield ──────────────────────────────────────────────────────────────
        function createStarrySkybox() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#05111f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 400; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.8 ? '#00B9F1' : '#ffffff';
                ctx.globalAlpha = 0.3 + Math.random() * 0.7; ctx.fill();
            }
            const sky = document.createElement('a-sky');
            sky.setAttribute('src', canvas.toDataURL());
            sceneEl.appendChild(sky);
        }
        createStarrySkybox();

        // ── Main data fetch ───────────────────────────────────────────────────────
        async function loadGallery() {
            try {
                // 1. Fetch 3D UMAP projections
                setProgress(10, 'Fetching 3D coordinates…');
                const coordRes = await fetch(`${BACKEND}/coordinates/`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const coordData = await coordRes.json();  // [{id, projection:[x,y,z], filename, …}]

                if (coordData.length === 0) {
                    setProgress(100, 'No images found in database.');
                    setTimeout(() => { loadingOverlay.style.display = 'none'; }, 1500);
                    return;
                }

                // 2. Fetch images (base64)
                setProgress(40, 'Fetching images…');
                const imgRes = await fetch(`${BACKEND}/retrieve/images`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const imgData = await imgRes.json();  // [{id, image_base64, content_type, …}]

                // Build a map: id → base64 data-URI
                setProgress(65, 'Preparing textures…');
                window.globalImgMap = {};
                for (const item of imgData) {
                    if (item.image_base64) {
                        window.globalImgMap[item.id] = `data:${item.content_type};base64,${item.image_base64}`;
                    }
                }

                // 3. Compute bounding box of UMAP projections to normalise scale
                const xs = coordData.map(d => d.projection[0]);
                const ys = coordData.map(d => d.projection[1]);
                const zs = coordData.map(d => d.projection[2]);
                const maxRange = Math.max(
                    Math.max(...xs) - Math.min(...xs),
                    Math.max(...ys) - Math.min(...ys),
                    Math.max(...zs) - Math.min(...zs),
                    1  // avoid division by zero
                );
                window.globalScale = (UMAP_SCALE * 2) / maxRange;  // maps to ~[-UMAP_SCALE, +UMAP_SCALE]
                window.globalCx = (Math.max(...xs) + Math.min(...xs)) / 2;
                window.globalCy = (Math.max(...ys) + Math.min(...ys)) / 2;
                window.globalCz = (Math.max(...zs) + Math.min(...zs)) / 2;

                // 4. Build A-Frame entities
                setProgress(80, `Building ${coordData.length} photo entities…`);
                coordData.forEach((doc, index) => {
                    const [ux, uy, uz] = doc.projection;
                    const pos = {
                        x: (ux - window.globalCx) * window.globalScale,
                        y: (uy - window.globalCy) * window.globalScale,
                        z: (uz - window.globalCz) * window.globalScale,
                    };

                    // Depth from origin → opacity (closer = more opaque)
                    const dist = Math.sqrt(pos.x ** 2 + pos.y ** 2 + pos.z ** 2);
                    const maxDist = UMAP_SCALE * Math.sqrt(3);
                    const baseOpacity = Math.max(0.35, 1.0 - (dist / maxDist) * 0.65);

                    const imgSrc = window.globalImgMap[doc.id] || null;
                    createPhotoEntity(pos, baseOpacity, index, doc, imgSrc);
                });

                setProgress(100, 'Ready!');
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 700);

                // Start listening to the AI Agent
                pollEvents();

            } catch (err) {
                console.error('Gallery load failed:', err);
                setProgress(100, 'Failed to load.');
                showError(`Backend error: ${err.message}. Is the server running at ${BACKEND}?`);
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 2000);
            }
        }

        // ── Photo entity factory ──────────────────────────────────────────────────
        function createPhotoEntity(pos, baseOpacity, index, doc, imgSrc) {
            const docId = doc.id;
            const filename = doc.filename;

            const wrapper = document.createElement('a-entity');
            wrapper.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            wrapper.setAttribute('look-at', '[camera]');
            wrapper.classList.add('interactive');
            wrapper.dataset.docId = docId;

            // Frame
            const frame = document.createElement('a-plane');
            frame.setAttribute('width', '1.68');
            frame.setAttribute('height', '1.08');
            frame.setAttribute('material', `shader: flat; color: #ffffff; transparent: true; opacity: ${baseOpacity * 0.2}`);
            wrapper.appendChild(frame);

            let bgPlane = null;
            let textEl = null;
            let img = null;

            if (imgSrc) {
                // Image Content
                img = document.createElement('a-image');
                img.setAttribute('width', '1.6');
                img.setAttribute('height', '1.0');
                img.setAttribute('position', '0 0 0.01');
                img.setAttribute('opacity', baseOpacity);

                // Register in <a-assets> for caching
                const imgId = `img-${index}`;
                const nativeImg = document.createElement('img');
                nativeImg.crossOrigin = 'anonymous';
                nativeImg.id = imgId;
                nativeImg.src = imgSrc;
                assetsEl.appendChild(nativeImg);
                img.setAttribute('src', `#${imgId}`);
                wrapper.appendChild(img);
            } else {
                // It's a music file or text file without an image!
                bgPlane = document.createElement('a-plane');
                bgPlane.setAttribute('width', '1.6');
                bgPlane.setAttribute('height', '1.0');
                bgPlane.setAttribute('position', '0 0 0.01');
                bgPlane.setAttribute('material', `color: #0A2540; shader: flat; transparent: true; opacity: ${baseOpacity}`);
                wrapper.appendChild(bgPlane);

                textEl = document.createElement('a-text');
                const title = doc.title || filename || 'Unknown Track';
                textEl.setAttribute('value', `🎵\n\n${title}`);
                textEl.setAttribute('align', 'center');
                textEl.setAttribute('width', '1.5');
                textEl.setAttribute('wrap-count', '25');
                textEl.setAttribute('color', '#00FFFF');
                textEl.setAttribute('position', '0 0 0.02');
                textEl.setAttribute('opacity', baseOpacity);
                wrapper.appendChild(textEl);
            }

            const setOpacity = (op) => {
                if (img) {
                    img.setAttribute('opacity', op);
                } else {
                    bgPlane.setAttribute('material', `color: #0A2540; shader: flat; transparent: true; opacity: ${op}`);
                    textEl.setAttribute('opacity', op);
                }
            };

            // Hover / select interactions
            wrapper.dataset.selected = 'false';

            wrapper.addEventListener('mouseenter', () => {
                if (wrapper.dataset.selected === 'false') {
                    setOpacity('1.0');
                    frame.setAttribute('material', 'color: #0770E3; opacity: 0.8');
                }
            });

            wrapper.addEventListener('mouseleave', () => {
                if (wrapper.dataset.selected === 'false') {
                    setOpacity(baseOpacity);
                    frame.setAttribute('material', `color: #ffffff; opacity: ${baseOpacity * 0.2}`);
                }
            });

            wrapper.addEventListener('click', () => {
                const isSelected = wrapper.dataset.selected === 'true';
                if (!isSelected) {
                    wrapper.dataset.selected = 'true';
                    setOpacity('1.0');
                    frame.setAttribute('material', 'color: #00FFFF; opacity: 1.0; shader: flat');
                    selectedPhotos.push(docId);
                    console.log(`SELECTED  id=${docId} file=${filename}`, selectedPhotos);
                } else {
                    wrapper.dataset.selected = 'false';
                    setOpacity('1.0');
                    frame.setAttribute('material', 'color: #0770E3; opacity: 0.8; shader: flat');
                    const i = selectedPhotos.indexOf(docId);
                    if (i > -1) selectedPhotos.splice(i, 1);
                    console.log(`DESELECTED id=${docId}`, selectedPhotos);
                }

                // 🌟 Send currently selected images to the AI Agent
                if (selectedPhotos.length > 0) {
                    try {
                        const imagesBase64 = selectedPhotos.map(id => {
                            const data = window.globalImgMap[id];
                            return data ? data.split(',')[1] : null;
                        }).filter(Boolean); // Only send valid images

                        if (imagesBase64.length > 0) {
                            fetch(`${BACKEND}/recommend/`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'ngrok-skip-browser-warning': 'true'
                                },
                                body: JSON.stringify({ images_base64: imagesBase64 })
                            });
                            console.log("Sent selection to agent!");
                        }
                    } catch (e) {
                        console.error("Failed to notify agent", e);
                    }
                }

                // VR fuse fix
                wrapper.classList.remove('interactive');
                setTimeout(() => wrapper.classList.add('interactive'), 150);
            });

            galleryEl.appendChild(wrapper);
        }

        // ── Arrow guide logic ─────────────────────────────────────────────────────
        let guideInterval;
        const arrows = {
            top: document.getElementById('arrow-top'),
            topRight: document.getElementById('arrow-top-right'),
            right: document.getElementById('arrow-right'),
            bottomRight: document.getElementById('arrow-bottom-right'),
            bottom: document.getElementById('arrow-bottom'),
            bottomLeft: document.getElementById('arrow-bottom-left'),
            left: document.getElementById('arrow-left'),
            topLeft: document.getElementById('arrow-top-left'),
        };

        function guideToPoint(targetPos) {
            clearInterval(guideInterval);
            Object.values(arrows).forEach(el => el.setAttribute('visible', 'false'));

            const cameraEl = document.querySelector('a-camera');
            const cameraObj = cameraEl.getObject3D('camera');
            const targetVec = new THREE.Vector3(targetPos.x, targetPos.y, targetPos.z);

            guideInterval = setInterval(() => {
                if (!cameraObj) return;

                // Force matrix update to ensure we have the absolute latest orientation
                cameraObj.updateMatrixWorld(true);

                const camWorldPos = new THREE.Vector3();
                cameraObj.getWorldPosition(camWorldPos);

                const camQuat = new THREE.Quaternion();
                cameraObj.getWorldQuaternion(camQuat);

                const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camQuat).normalize();
                const camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camQuat).normalize();
                const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat).normalize();

                const dirToTarget = targetVec.clone().sub(camWorldPos).normalize();
                const dotRight = dirToTarget.dot(camRight);
                const dotUp = dirToTarget.dot(camUp);
                const dotForward = dirToTarget.dot(camForward);

                console.log(`[DEBUG Guide] Tgt: ${targetVec.x.toFixed(1)}, ${targetVec.y.toFixed(1)}, ${targetVec.z.toFixed(1)} | DotF: ${dotForward.toFixed(2)} DotR: ${dotRight.toFixed(2)} DotU: ${dotUp.toFixed(2)}`);

                Object.values(arrows).forEach(el => el.setAttribute('visible', 'false'));

                if (dotForward > 0.95) {
                    clearInterval(guideInterval);
                    console.log('Guide: target found!');
                    return;
                }

                let angle = Math.atan2(dotUp, dotRight) * (180 / Math.PI);
                if (angle < 0) angle += 360;

                if (angle >= 337.5 || angle < 22.5) arrows.right.setAttribute('visible', 'true');
                else if (angle >= 22.5 && angle < 67.5) arrows.topRight.setAttribute('visible', 'true');
                else if (angle >= 67.5 && angle < 112.5) arrows.top.setAttribute('visible', 'true');
                else if (angle >= 112.5 && angle < 157.5) arrows.topLeft.setAttribute('visible', 'true');
                else if (angle >= 157.5 && angle < 202.5) arrows.left.setAttribute('visible', 'true');
                else if (angle >= 202.5 && angle < 247.5) arrows.bottomLeft.setAttribute('visible', 'true');
                else if (angle >= 247.5 && angle < 292.5) arrows.bottom.setAttribute('visible', 'true');
                else if (angle >= 292.5 && angle < 337.5) arrows.bottomRight.setAttribute('visible', 'true');
            }, 100);
        }

        function createFlightResultsWindow(flightData) {
            const hudContainer = document.getElementById('hud-container');
            hudContainer.innerHTML = ''; // clear existing

            // 1. Create a dark backdrop to hide the gallery
            const backdrop = document.createElement('a-plane');
            backdrop.setAttribute('width', '100'); // make it extremely large to cover all peripheral vision
            backdrop.setAttribute('height', '100');
            backdrop.setAttribute('position', '0 0 -1.5'); // comfortable distance
            backdrop.setAttribute('material', 'color: #020813; shader: flat; opacity: 0.0; transparent: true');
            backdrop.setAttribute('render-top', ''); // force it to render over all photos
            // Fade-in animation for backdrop
            backdrop.setAttribute('animation', 'property: material.opacity; to: 0.85; dur: 400; easing: easeOutQuad');

            // Allow clicking the backdrop to close it too
            backdrop.classList.add('interactive');
            // Click listener is attached at the end of the function
            hudContainer.appendChild(backdrop);

            // 2. Create the canvas for the flight results
            const canvas = document.createElement('canvas');
            canvas.width = 1600;
            canvas.height = 1200;
            const ctx = canvas.getContext('2d');

            const bgLight = '#F1F2F8';
            const skyBlue = '#00246B';
            const accent = '#0770E3';
            const white = '#FFFFFF';
            const textDark = '#111236';
            const textGray = '#68737D';

            // Helper for rounded rect
            function roundRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
            }

            // Fill background
            ctx.fillStyle = bgLight;
            roundRect(ctx, 0, 0, canvas.width, canvas.height, 40);

            // Header banner
            ctx.fillStyle = skyBlue;
            ctx.beginPath();
            ctx.moveTo(40, 0); ctx.lineTo(canvas.width - 40, 0);
            ctx.quadraticCurveTo(canvas.width, 0, canvas.width, 40);
            ctx.lineTo(canvas.width, 160);
            ctx.lineTo(0, 160);
            ctx.lineTo(0, 40);
            ctx.quadraticCurveTo(0, 0, 40, 0);
            ctx.closePath();
            ctx.fill();

            // Header Text
            ctx.fillStyle = white;
            ctx.font = 'bold 52px -apple-system, system-ui, sans-serif';
            ctx.fillText(`✈️ Barcelona to ${flightData.destination[0] || 'Unknown'}`, 80, 80);
            ctx.font = '32px -apple-system, system-ui, sans-serif';
            ctx.fillStyle = '#B0C4DE';
            ctx.fillText(`1 adult • Economy • Round trip`, 80, 130);

            // Close button (top right)
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            roundRect(ctx, canvas.width - 220, 50, 160, 60, 30);
            ctx.fillStyle = white;
            ctx.font = 'bold 28px -apple-system, system-ui, sans-serif';
            ctx.fillText('✕ Close', canvas.width - 192, 90);

            // Cards
            const startY = 200;
            const cardH = 300;
            const gap = 30;

            const labels = ['✨ Best', '💰 Cheapest', '⚡️ Fastest'];

            for (let i = 0; i < 3; i++) {
                const y = startY + i * (cardH + gap);

                // Draw Card
                ctx.fillStyle = white;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.05)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 8;
                roundRect(ctx, 60, y, canvas.width - 120, cardH, 20);
                ctx.shadowColor = 'transparent';

                // Badge
                ctx.fillStyle = '#E2E8F0';
                roundRect(ctx, 60, y, 220, 48, 20);
                ctx.fillRect(60, y + 24, 220, 24); // square bottom corners
                ctx.fillStyle = textDark;
                ctx.font = 'bold 22px -apple-system, system-ui, sans-serif';
                ctx.fillText(labels[i], 90, y + 32);

                // --- Outbound ---
                let rowY = y + 100;
                // Airline logo circle
                ctx.fillStyle = '#F1F2F8';
                ctx.beginPath(); ctx.arc(120, rowY - 10, 35, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = accent; ctx.font = '30px Arial'; ctx.fillText('✈️', 105, rowY);

                // Times
                ctx.fillStyle = textDark;
                ctx.font = 'bold 36px -apple-system, system-ui, sans-serif';
                ctx.fillText(`${flightData.time_go_1[i]}  –  ${flightData.time_go_2[i]}`, 190, rowY);
                // Airline
                ctx.fillStyle = textGray;
                ctx.font = '24px -apple-system, system-ui, sans-serif';
                ctx.fillText(`Vueling / Iberia`, 190, rowY + 35);

                // Stops
                const stopsGo = flightData.stops[i];
                ctx.fillStyle = textGray;
                ctx.textAlign = 'right';
                ctx.fillText(`${flightData.time_go[i]}`, 720, rowY - 10);
                ctx.fillStyle = stopsGo === 0 ? '#00A698' : '#D97757';
                ctx.font = 'bold 24px -apple-system, system-ui, sans-serif';
                ctx.fillText(stopsGo === 0 ? 'Direct' : `${stopsGo} stop${stopsGo > 1 ? 's' : ''}`, 720, rowY + 25);
                ctx.textAlign = 'left';

                // Connecting line
                ctx.strokeStyle = '#CBD5E1';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(460, rowY - 15); ctx.lineTo(620, rowY - 15); ctx.stroke();

                // --- Return ---
                rowY = y + 210;
                // Airline logo circle
                ctx.fillStyle = '#F1F2F8';
                ctx.beginPath(); ctx.arc(120, rowY - 10, 35, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = accent; ctx.font = '30px Arial'; ctx.fillText('✈️', 105, rowY);

                // Times
                ctx.fillStyle = textDark;
                ctx.font = 'bold 36px -apple-system, system-ui, sans-serif';
                ctx.fillText(`${flightData.time_return_1[i]}  –  ${flightData.time_return_2[i]}`, 190, rowY);
                // Airline
                ctx.fillStyle = textGray;
                ctx.font = '24px -apple-system, system-ui, sans-serif';
                ctx.fillText(`Vueling / Iberia`, 190, rowY + 35);

                // Stops
                ctx.fillStyle = textGray;
                ctx.textAlign = 'right';
                ctx.fillText(`${flightData.time_return[i]}`, 720, rowY - 10);
                ctx.fillStyle = stopsGo === 0 ? '#00A698' : '#D97757';
                ctx.font = 'bold 24px -apple-system, system-ui, sans-serif';
                ctx.fillText(stopsGo === 0 ? 'Direct' : `${stopsGo} stop${stopsGo > 1 ? 's' : ''}`, 720, rowY + 25);
                ctx.textAlign = 'left';

                // Connecting line
                ctx.strokeStyle = '#CBD5E1';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(460, rowY - 15); ctx.lineTo(620, rowY - 15); ctx.stroke();

                // --- Vertical Divider ---
                ctx.strokeStyle = '#E2E8F0';
                ctx.beginPath(); ctx.moveTo(1150, y + 40); ctx.lineTo(1150, y + 260); ctx.stroke();

                // --- Price & Button (Right Side) ---
                ctx.textAlign = 'right';
                ctx.fillStyle = textDark;
                ctx.font = 'bold 56px -apple-system, system-ui, sans-serif';
                ctx.fillText(`€${flightData.price[i]}`, canvas.width - 120, y + 140);
                ctx.fillStyle = textGray;
                ctx.font = '22px -apple-system, system-ui, sans-serif';
                ctx.fillText(`total`, canvas.width - 120, y + 175);
                ctx.textAlign = 'left';

                // Select button
                ctx.fillStyle = accent;
                roundRect(ctx, canvas.width - 340, y + 200, 220, 60, 30);
                ctx.fillStyle = white;
                ctx.font = 'bold 26px -apple-system, system-ui, sans-serif';
                ctx.fillText('Select', canvas.width - 265, y + 240);
            }

            // Create plane entity for the canvas
            const plane = document.createElement('a-plane');
            plane.setAttribute('width', '1.2'); // comfortable viewing width
            plane.setAttribute('height', '0.9'); // comfortable viewing height
            plane.setAttribute('position', '0 0 -1.4');  // slightly in front of backdrop
            plane.setAttribute('src', canvas.toDataURL());
            plane.setAttribute('material', `shader: flat; transparent: true; opacity: 0.0`); // start invisible
            plane.setAttribute('scale', '0.01 0.01 0.01'); // start tiny

            // Pop-in animation
            plane.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 600; easing: easeOutElastic');
            plane.setAttribute('animation__fade', 'property: material.opacity; to: 1.0; dur: 300; easing: easeOutQuad');

            plane.setAttribute('render-top', ''); // force it to render over the backdrop and photos
            plane.classList.add('interactive');

            // Function to gracefully close the UI
            let isClosing = false;
            const closeWindow = () => {
                if (isClosing) return;
                isClosing = true;
                backdrop.setAttribute('animation', 'property: material.opacity; to: 0.0; dur: 200; easing: easeOutQuad');
                plane.setAttribute('animation__scale', 'property: scale; to: 0.01 0.01 0.01; dur: 200; easing: easeInQuad');
                plane.setAttribute('animation__fade', 'property: material.opacity; to: 0.0; dur: 200; easing: easeInQuad');
                setTimeout(() => { hudContainer.innerHTML = ''; }, 200);
            };

            backdrop.addEventListener('click', closeWindow);

            plane.addEventListener('click', (evt) => {
                const intersection = evt.detail.intersection;
                if (intersection) {
                    const uv = intersection.uv;
                    // Close button logic top right
                    if (uv.x > 0.8 && uv.y > 0.8) {
                        closeWindow();
                    }
                }
            });

            // Auto-close after 5 seconds
            setTimeout(() => {
                closeWindow();
            }, 5000);

            hudContainer.appendChild(plane);
        }

        function createDestinationWindow(flight) {
            const hudContainer = document.getElementById('hud-container');
            hudContainer.innerHTML = ''; // clear existing

            // Backdrop
            const backdrop = document.createElement('a-plane');
            backdrop.setAttribute('width', '100');
            backdrop.setAttribute('height', '100');
            backdrop.setAttribute('position', '0 0 -1.5');
            backdrop.setAttribute('material', 'color: #020813; shader: flat; opacity: 0.0; transparent: true');
            backdrop.setAttribute('render-top', '');
            backdrop.setAttribute('animation', 'property: material.opacity; to: 0.85; dur: 400; easing: easeOutQuad');
            backdrop.classList.add('interactive');
            hudContainer.appendChild(backdrop);

            // Canvas
            const canvas = document.createElement('canvas');
            canvas.width = 1200;
            canvas.height = 700;
            const ctx = canvas.getContext('2d');

            const bgLight = '#F1F2F8';
            const skyBlue = '#00246B';
            const accent = '#0770E3';
            const white = '#FFFFFF';
            const textDark = '#111236';
            const textGray = '#68737D';

            function roundRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
            }

            // Fill background
            ctx.fillStyle = bgLight;
            roundRect(ctx, 0, 0, canvas.width, canvas.height, 40);

            // Header banner
            ctx.fillStyle = skyBlue;
            ctx.beginPath();
            ctx.moveTo(40, 0); ctx.lineTo(canvas.width - 40, 0);
            ctx.quadraticCurveTo(canvas.width, 0, canvas.width, 40);
            ctx.lineTo(canvas.width, 180);
            ctx.lineTo(0, 180);
            ctx.lineTo(0, 40);
            ctx.quadraticCurveTo(0, 0, 40, 0);
            ctx.closePath();
            ctx.fill();

            // Header Text
            ctx.fillStyle = white;
            ctx.font = 'bold 48px -apple-system, system-ui, sans-serif';
            ctx.fillText(`✨ AI Agent Suggests: ${flight.flight_dest || 'Unknown'}`, 80, 100);

            // Close button (top right)
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            roundRect(ctx, canvas.width - 220, 60, 160, 60, 30);
            ctx.fillStyle = white;
            ctx.font = 'bold 28px -apple-system, system-ui, sans-serif';
            ctx.fillText('✕ Close', canvas.width - 192, 100);

            // Card
            ctx.fillStyle = white;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.05)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 8;
            roundRect(ctx, 60, 240, canvas.width - 120, 400, 20);
            ctx.shadowColor = 'transparent';

            // Flight Details
            let rowY = 440;
            ctx.fillStyle = '#F1F2F8';
            ctx.beginPath(); ctx.arc(140, rowY - 10, 45, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = accent; ctx.font = '40px Arial'; ctx.fillText('✈️', 120, rowY + 5);

            // Times
            ctx.fillStyle = textDark;
            ctx.font = 'bold 56px -apple-system, system-ui, sans-serif';
            const dep = flight.departure || "TBD";
            const arr = flight.arrival || "TBD";
            ctx.fillText(dep, 220, rowY);
            ctx.fillText(arr, 640, rowY);

            // City Names (Origin & Destination)
            ctx.fillStyle = textGray;
            ctx.font = '28px -apple-system, system-ui, sans-serif';
            ctx.fillText("Barcelona", 220, rowY - 60);
            ctx.fillText(flight.flight_dest || 'Unknown', 640, rowY - 60);

            // Stops & Duration (Centered over and under the line)
            ctx.textAlign = 'center';
            const duration = flight.duration_mins ? `${Math.floor(flight.duration_mins / 60)}h ${flight.duration_mins % 60}m` : '';
            ctx.fillStyle = textGray;
            ctx.font = '28px -apple-system, system-ui, sans-serif';
            ctx.fillText(duration, 510, rowY - 40);

            ctx.fillStyle = flight.stops === 0 ? '#00A698' : '#D97757';
            ctx.font = 'bold 28px -apple-system, system-ui, sans-serif';
            ctx.fillText(flight.stops === 0 ? 'Direct' : `${flight.stops} stop(s)`, 510, rowY + 35);
            ctx.textAlign = 'left';

            // Connecting Line
            ctx.strokeStyle = '#CBD5E1';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(380, rowY - 15); ctx.lineTo(600, rowY - 15); ctx.stroke();

            // Vertical Divider
            ctx.strokeStyle = '#E2E8F0';
            ctx.beginPath(); ctx.moveTo(850, 280); ctx.lineTo(850, 600); ctx.stroke();

            // Price
            ctx.textAlign = 'right';
            ctx.fillStyle = textDark;
            ctx.font = 'bold 72px -apple-system, system-ui, sans-serif';
            ctx.fillText(`${flight.currency === 'USD' ? '$' : '€'}${flight.price || '---'}`, canvas.width - 100, 390);
            ctx.fillStyle = textGray;
            ctx.font = '28px -apple-system, system-ui, sans-serif';
            ctx.fillText('total', canvas.width - 100, 435);

            // Button
            ctx.fillStyle = accent;
            roundRect(ctx, canvas.width - 320, 480, 220, 80, 40);
            ctx.fillStyle = white;
            ctx.textAlign = 'center';
            ctx.font = 'bold 32px -apple-system, system-ui, sans-serif';
            ctx.fillText('Book Now', canvas.width - 210, 532);
            ctx.textAlign = 'left';

            const plane = document.createElement('a-plane');
            plane.setAttribute('width', '1.2');
            plane.setAttribute('height', '0.7');
            plane.setAttribute('position', '0 0 -1.4');
            plane.setAttribute('src', canvas.toDataURL());
            plane.setAttribute('material', `shader: flat; transparent: true; opacity: 0.0`);
            plane.setAttribute('scale', '0.01 0.01 0.01');

            plane.setAttribute('animation__scale', 'property: scale; to: 1 1 1; dur: 600; easing: easeOutElastic');
            plane.setAttribute('animation__fade', 'property: material.opacity; to: 1.0; dur: 300; easing: easeOutQuad');
            plane.setAttribute('render-top', '');
            plane.classList.add('interactive');

            let isClosing = false;
            const closeWindow = () => {
                if (isClosing) return;
                isClosing = true;
                backdrop.setAttribute('animation', 'property: material.opacity; to: 0.0; dur: 200; easing: easeOutQuad');
                plane.setAttribute('animation__scale', 'property: scale; to: 0.01 0.01 0.01; dur: 200; easing: easeInQuad');
                plane.setAttribute('animation__fade', 'property: material.opacity; to: 0.0; dur: 200; easing: easeInQuad');
                setTimeout(() => { hudContainer.innerHTML = ''; }, 200);
            };

            backdrop.addEventListener('click', closeWindow);
            plane.addEventListener('click', (evt) => {
                const intersection = evt.detail.intersection;
                if (intersection) {
                    const uv = intersection.uv;
                    if (uv.x > 0.8 && uv.y > 0.8) { // Top right 20%
                        closeWindow();
                    }
                }
            });

            setTimeout(() => { closeWindow(); }, 5000);
            hudContainer.appendChild(plane);
        }

        // ── AI Agent Event Polling ────────────────────────────────────────────────
        async function pollEvents() {
            try {
                const res = await fetch(`${BACKEND}/events/front`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.event && data.event.position) {
                        const [ux, uy, uz] = data.event.position;
                        const pos = {
                            x: (ux - window.globalCx) * window.globalScale,
                            y: (uy - window.globalCy) * window.globalScale,
                            z: (uz - window.globalCz) * window.globalScale,
                        };
                        console.log(`Agent said: ${data.event.vibe}. Guiding to:`, pos);
                        guideToPoint(pos);
                        showError(`Agent guiding you to: ${data.event.vibe}`); // Reusing errorBanner as a notification popup
                    } else if (data.event && data.event.type === 'results') {
                        console.log('Received flight results:', data.event);
                        const flightData = {
                            origin: data.event.origin,
                            destination: data.event.flight_dest,
                            stops: data.event.stops,
                            time_go: data.event.time_go,
                            time_return: data.event.time_return,
                            price: data.event.price,
                            time_go_1: data.event.time_go_1,
                            time_go_2: data.event.time_go_2,
                            time_return_1: data.event.time_return_1,
                            time_return_2: data.event.time_return_2
                        };
                        createFlightResultsWindow(flightData);
                        showError('Flight results received! ✈️');
                    } else if (data.event && data.event.type === 'destination') {
                        console.log('Received single destination:', data.event);
                        createDestinationWindow(data.event);
                        showError(`Agent recommends: ${data.event.flight_dest || 'a new destination'}! ✈️`);
                    }
                }
            } catch (e) {
                console.error("Polling error:", e);
            }
            setTimeout(pollEvents, 2000);
        }

        // ── Boot ──────────────────────────────────────────────────────────────────
        loadGallery().then(() => {
            pollEvents();
        });
    </script>
</body>

</html>
