<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Skyscanner VR Gallery - Smart Guide Optimized (8 Directions)</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <style>
    body { overflow: hidden; margin: 0; background-color: #05111f; }
  </style>
</head>
<body>

  <a-scene background="color: #05111f" cursor="rayOrigin: mouse" raycaster="objects: .interactive">
    <a-camera position="0 0 0" look-controls="pointerLockEnabled: false">
      
      <a-entity cursor="fuse: true; fuseTimeout: 1500" position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.02"
                material="color: #0770E3; shader: flat"
                animation__mouseenter="property: scale; to: 1.5 1.5 1.5; startEvents: mouseenter; dur: 200"
                animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
                animation__color_enter="property: material.color; type: color; to: #00B9F1; startEvents: mouseenter; dur: 200"
                animation__color_leave="property: material.color; type: color; to: #0770E3; startEvents: mouseleave; dur: 200">
      </a-entity>

      <a-entity id="arrow-top" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="0 0.35 -1" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
      
      <a-entity id="arrow-top-right" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="0.32 0.25 -1" rotation="0 0 -45" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>

      <a-entity id="arrow-right" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="0.45 0 -1" rotation="0 0 -90" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
      
      <a-entity id="arrow-bottom-right" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="0.32 -0.18 -1" rotation="0 0 -135" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>

      <a-entity id="arrow-bottom" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="0 -0.25 -1" rotation="0 0 180" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
      
      <a-entity id="arrow-bottom-left" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="-0.32 -0.18 -1" rotation="0 0 135" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>

      <a-entity id="arrow-left" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="-0.45 0 -1" rotation="0 0 90" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
      
      <a-entity id="arrow-top-left" geometry="primitive: triangle" scale="0.2 0.08 1" material="color: #00FFFF; shader: flat; transparent: true" 
                position="-0.32 0.25 -1" rotation="0 0 45" visible="false" 
                animation="property: material.opacity; from: 0.1; to: 1.0; loop: true; dir: alternate; dur: 300"></a-entity>
    </a-camera>

    <a-entity id="gallery-container"></a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const assetsEl = document.createElement('a-assets');
    sceneEl.prepend(assetsEl);

    // Array to store selected photo indices
    const selectedPhotos = [];

    // --- Print to Terminal Helper ---
    function printToTerminal(action, index) {
      console.log(`\n=== TERMINAL OUTPUT ===`);
      console.log(`> Action: ${action} Photo #${index}`);
      console.log(`> Current Selected List: [${selectedPhotos.join(', ')}]`);
      console.log(`=======================\n`);
    }

    // --- Starfield ---
    function createStarrySkybox() {
      const canvas = document.createElement('canvas');
      canvas.width = 2048; canvas.height = 1024;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#05111f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 400; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
        ctx.fillStyle = Math.random() > 0.8 ? '#00B9F1' : '#ffffff';
        ctx.globalAlpha = 0.3 + Math.random() * 0.7; ctx.fill();
      }
      const sky = document.createElement('a-sky');
      sky.setAttribute('src', canvas.toDataURL());
      sceneEl.appendChild(sky);
    }
    createStarrySkybox();

    // --- Gallery Logic ---
    const TOTAL_PHOTOS = 60; 
    function calculateLayers(total) {
      if (total <= 0) return [];
      const depths = [
        { r: 4.5, op: 1.0, weight: 0.2 }, { r: 7.5, op: 0.7, weight: 0.35 }, { r: 11.5, op: 0.45, weight: 0.45 }
      ];
      let remaining = total; const calc = [];
      for (let i = 0; i < depths.length; i++) {
        if (remaining <= 0) break;
        let c = Math.ceil(total * depths[i].weight);
        if (i === depths.length - 1 || c > remaining) c = remaining;
        remaining -= c;
        if (c > 0) calc.push({ radius: depths[i].r, count: c, opacity: depths[i].op });
      }
      return calc;
    }

    const galleryEl = document.getElementById('gallery-container');
    let photoIndex = 0;
    
    // Hardcode test variable
    let testTargetPosition = null; 

    calculateLayers(TOTAL_PHOTOS).forEach(layer => {
      const goldenRatio = (1 + Math.sqrt(5)) / 2;
      for (let i = 0; i < layer.count; i++) {
        const theta = 2 * Math.PI * i / goldenRatio;
        const phi = Math.acos(1 - 2 * (i + 0.5) / layer.count); 
        const pos = { 
          x: layer.radius * Math.sin(phi) * Math.cos(theta), 
          y: layer.radius * Math.cos(phi), 
          z: layer.radius * Math.sin(phi) * Math.sin(theta)
        };
        
        if (photoIndex === 15) testTargetPosition = pos; // Save 15th photo position

        createPhotoEntity(pos, layer.opacity, photoIndex++);
      }
    });

    function createPhotoEntity(pos, baseOpacity, index) {
      const wrapper = document.createElement('a-entity');
      wrapper.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
      wrapper.setAttribute('look-at', '[camera]');
      wrapper.classList.add('interactive'); // Raycaster target

      const frame = document.createElement('a-plane');
      frame.setAttribute('width', '1.68'); frame.setAttribute('height', '1.08'); 
      frame.setAttribute('material', `shader: flat; color: #ffffff; transparent: true; opacity: ${baseOpacity * 0.2}`);

      const seed = 1000 + index;
      const imgId = `gallery-img-${index}`;
      
      const nativeImg = document.createElement('img');
      nativeImg.crossOrigin = 'anonymous'; nativeImg.id = imgId;
      nativeImg.src = `https://loremflickr.com/800/500?lock=${seed}`; 
      assetsEl.appendChild(nativeImg); 
      
      const img = document.createElement('a-image');
      img.setAttribute('width', '1.6'); img.setAttribute('height', '1.0'); 
      img.setAttribute('position', '0 0 0.01'); img.setAttribute('src', `#${imgId}`); 
      img.setAttribute('opacity', baseOpacity);
      
      wrapper.dataset.selected = 'false';

      wrapper.addEventListener('mouseenter', () => { 
        if (wrapper.dataset.selected === 'false') {
          img.setAttribute('opacity', '1.0');
          frame.setAttribute('material', 'color: #0770E3; opacity: 0.8'); 
        }
      });
      
      wrapper.addEventListener('mouseleave', () => { 
        if (wrapper.dataset.selected === 'false') {
          img.setAttribute('opacity', baseOpacity);
          frame.setAttribute('material', `color: #ffffff; opacity: ${baseOpacity * 0.2}`); 
        }
      });
      
      wrapper.addEventListener('click', () => {
        const isSelected = wrapper.dataset.selected === 'true';
        if (!isSelected) {
          wrapper.dataset.selected = 'true';
          img.setAttribute('opacity', '1.0');
          frame.setAttribute('material', 'color: #00FFFF; opacity: 1.0; shader: flat');
          
          selectedPhotos.push(index);
          printToTerminal("SELECTED", index);
        } else {
          wrapper.dataset.selected = 'false';
          img.setAttribute('opacity', '1.0');
          frame.setAttribute('material', 'color: #0770E3; opacity: 0.8; shader: flat');
          
          const arrayIndex = selectedPhotos.indexOf(index);
          if (arrayIndex > -1) selectedPhotos.splice(arrayIndex, 1);
          printToTerminal("DESELECTED", index);
        }

        // --- VR FUSE FIX: Force Raycaster Reset ---
        wrapper.classList.remove('interactive');
        setTimeout(() => {
          wrapper.classList.add('interactive');
        }, 150);
      });

      wrapper.appendChild(frame);
      wrapper.appendChild(img);
      galleryEl.appendChild(wrapper);
    }

    // --- Smart Directional 3D Guide Logic (8 Directions) ---
    let guideInterval;
    
    const arrows = {
      top: document.getElementById('arrow-top'),
      topRight: document.getElementById('arrow-top-right'),
      right: document.getElementById('arrow-right'),
      bottomRight: document.getElementById('arrow-bottom-right'),
      bottom: document.getElementById('arrow-bottom'),
      bottomLeft: document.getElementById('arrow-bottom-left'),
      left: document.getElementById('arrow-left'),
      topLeft: document.getElementById('arrow-top-left')
    };

    function guideToPoint(targetPos) {
      console.log("Guiding to point:", targetPos);
      
      clearInterval(guideInterval);
      Object.values(arrows).forEach(el => el.setAttribute('visible', 'false'));

      const cameraEl = document.querySelector('a-camera');
      const cameraObj = cameraEl.getObject3D('camera');
      const targetVec = new THREE.Vector3(targetPos.x, targetPos.y, targetPos.z);

      guideInterval = setInterval(() => {
        const camMatrix = cameraObj.matrixWorld;
        const camWorldPos = new THREE.Vector3();
        cameraObj.getWorldPosition(camWorldPos);

        const camRight = new THREE.Vector3().setFromMatrixColumn(camMatrix, 0);
        const camUp = new THREE.Vector3().setFromMatrixColumn(camMatrix, 1);
        const camForward = new THREE.Vector3().setFromMatrixColumn(camMatrix, 2).negate();

        const dirToTarget = targetVec.clone().sub(camWorldPos).normalize();

        const dotRight = dirToTarget.dot(camRight);
        const dotUp = dirToTarget.dot(camUp);
        const dotForward = dirToTarget.dot(camForward);

        // Hide all arrows first
        Object.values(arrows).forEach(el => el.setAttribute('visible', 'false'));

        // --- SUCCESS CONDITION ---
        if (dotForward > 0.95) {
          clearInterval(guideInterval);
          console.log("=== Target found! Guide stopped. ===");
          return; 
        }

        // Calculate angle based on Up and Right vectors (returns degrees)
        let angle = Math.atan2(dotUp, dotRight) * (180 / Math.PI);
        if (angle < 0) angle += 360; // Normalize angle to 0-360 range

        // Map angle to 8 directional sectors (45 degrees per sector)
        if (angle >= 337.5 || angle < 22.5) {
          arrows.right.setAttribute('visible', 'true');
        } else if (angle >= 22.5 && angle < 67.5) {
          arrows.topRight.setAttribute('visible', 'true');
        } else if (angle >= 67.5 && angle < 112.5) {
          arrows.top.setAttribute('visible', 'true');
        } else if (angle >= 112.5 && angle < 157.5) {
          arrows.topLeft.setAttribute('visible', 'true');
        } else if (angle >= 157.5 && angle < 202.5) {
          arrows.left.setAttribute('visible', 'true');
        } else if (angle >= 202.5 && angle < 247.5) {
          arrows.bottomLeft.setAttribute('visible', 'true');
        } else if (angle >= 247.5 && angle < 292.5) {
          arrows.bottom.setAttribute('visible', 'true');
        } else if (angle >= 292.5 && angle < 337.5) {
          arrows.bottomRight.setAttribute('visible', 'true');
        }

      }, 100);
    }

    // --- Hardcoded Test: Trigger 3 seconds after page loads ---
    setTimeout(() => {
      if (testTargetPosition) {
        guideToPoint(testTargetPosition);
      }
    }, 3000);

  </script>
</body>
</html>
