<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Skyscanner VR Gallery - Smart Layout (Optimized)</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <style>
    :root {
      --sky-blue: #0770E3;
      --sky-cyan: #00B9F1;
      --overlay-bg: rgba(5, 17, 31, 0.95);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #overlay.active { display: flex; opacity: 1; }
    
    #overlay-img {
      width: 85vw; 
      height: 80vh; 
      object-fit: cover; 
      background: transparent; 
      border: none;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(7, 112, 227, 0.2);
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    #overlay.active #overlay-img { transform: scale(1); }

    #overlay-caption { color: #fff; font-size: 16px; margin-top: 20px; letter-spacing: 0.5px; opacity: 0.8; }

    #close-btn {
      position: absolute; top: 30px; right: 40px; color: #fff; font-size: 40px;
      cursor: pointer; background: none; border: none; opacity: 0.6; transition: all 0.2s;
    }
    #close-btn:hover { opacity: 1; color: var(--sky-cyan); transform: scale(1.1); }

    #hint {
      position: fixed; pointer-events: none; z-index: 100;
      color: rgba(255, 255, 255, 0.7); bottom: 24px; left: 50%;
      transform: translateX(-50%); font-size: 13px;
      background: rgba(0, 0, 0, 0.4); padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

  <div id="overlay">
    <button id="close-btn" onclick="closeOverlay()">&#x2715;</button>
    <img id="overlay-img" src="" alt="">
    <div id="overlay-caption"></div>
  </div>

  <div id="hint">🖱 Drag to look around &nbsp;|&nbsp; Hover & Click to expand</div>

  <a-scene background="color: #05111f" cursor="rayOrigin: mouse" raycaster="objects: .interactive">
    <a-camera position="0 0 0" look-controls="pointerLockEnabled: false">
      <a-entity cursor="fuse: true; fuseTimeout: 1500" position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.02"
                material="color: #0770E3; shader: flat"
                animation__mouseenter="property: scale; to: 1.5 1.5 1.5; startEvents: mouseenter; dur: 200"
                animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
                animation__color_enter="property: material.color; type: color; to: #00B9F1; startEvents: mouseenter; dur: 200"
                animation__color_leave="property: material.color; type: color; to: #0770E3; startEvents: mouseleave; dur: 200">
      </a-entity>
    </a-camera>

    <a-entity id="gallery-container"></a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const assetsEl = document.createElement('a-assets');
    sceneEl.prepend(assetsEl);

    // --- OPTIMIZATION 1: Performance - Generate Starfield Texture for Skybox ---
    // Instead of 200 separate <a-sphere> DOM entities, we draw stars on a canvas 
    // and use it as a single panoramic texture (<a-sky>). Drastically reduces draw calls.
    function createStarrySkybox() {
      const canvas = document.createElement('canvas');
      canvas.width = 2048;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');
      
      // Base background color
      ctx.fillStyle = '#05111f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw stars on canvas
      for (let i = 0; i < 400; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const radius = Math.random() * 1.5 + 0.5;
        
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = Math.random() > 0.8 ? '#00B9F1' : '#ffffff';
        ctx.globalAlpha = 0.3 + Math.random() * 0.7;
        ctx.fill();
      }

      // Create and inject the skybox
      const sky = document.createElement('a-sky');
      sky.setAttribute('src', canvas.toDataURL());
      sceneEl.appendChild(sky);
    }
    createStarrySkybox();


    // --- 2. Smart Layer Calculation ---
    const TOTAL_PHOTOS = 60; 

    function calculateLayers(total) {
      if (total <= 0) return [];

      const depths = [
        { r: 4.5, op: 1.0, weight: 0.2 },   // Inner
        { r: 7.5, op: 0.7, weight: 0.35 },  // Mid
        { r: 11.5, op: 0.45, weight: 0.45 } // Outer
      ];

      let remaining = total;
      const calculatedLayers = [];

      for (let i = 0; i < depths.length; i++) {
        if (remaining <= 0) break;
        let count = Math.ceil(total * depths[i].weight);
        if (i === depths.length - 1 || count > remaining) count = remaining;
        remaining -= count;

        if (count > 0) {
          calculatedLayers.push({
            radius: depths[i].r,
            count: count,
            opacity: depths[i].op
            // Removed minAngleDeg: No longer needed for Fibonacci Sphere
          });
        }
      }
      return calculatedLayers;
    }

    const layers = calculateLayers(TOTAL_PHOTOS);

    // --- OPTIMIZATION 2: Simplicity - Fibonacci Sphere Algorithm ---
    // Replaced random attempts + collision detection with a deterministic algorithm.
    // This is mathematically guaranteed to distribute points evenly and is extremely fast (O(n)).
    const galleryEl = document.getElementById('gallery-container');
    let photoIndex = 0;

    layers.forEach(layer => {
      const n = layer.count;
      const r = layer.radius;
      const goldenRatio = (1 + Math.sqrt(5)) / 2;

      for (let i = 0; i < n; i++) {
        // Calculate angles using the Fibonacci spiral formula
        const theta = 2 * Math.PI * i / goldenRatio;
        const phi = Math.acos(1 - 2 * (i + 0.5) / n); 
        
        // Convert spherical to Cartesian coordinates
        const pos = { 
          x: r * Math.sin(phi) * Math.cos(theta), 
          y: r * Math.cos(phi), 
          z: r * Math.sin(phi) * Math.sin(theta)
        };

        createPhotoEntity(pos, layer.opacity, photoIndex++);
      }
    });

    // --- OPTIMIZATION 3: Simplicity - look-at component ---
    function createPhotoEntity(pos, baseOpacity, index) {
      const wrapper = document.createElement('a-entity');
      wrapper.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
      
      // MAGIC HAPPENS HERE: Replaced Math.atan2 Euler calculations with the look-at component.
      // Images will now automatically face the camera at origin (0,0,0) and handle the horizontal flip inherently.
      wrapper.setAttribute('look-at', '[camera]');
      wrapper.classList.add('interactive');

      const frame = document.createElement('a-plane');
      frame.setAttribute('width', '0.84');
      frame.setAttribute('height', '0.54');
      frame.setAttribute('color', '#ffffff');
      frame.setAttribute('material', `shader: flat; transparent: true; opacity: ${baseOpacity * 0.2}`);
      
      frame.setAttribute('animation__enter', 'property: material.color; to: #0770E3; startEvents: mouseenter; dur: 200');
      frame.setAttribute('animation__enter_op', 'property: material.opacity; to: 1.0; startEvents: mouseenter; dur: 200');
      frame.setAttribute('animation__leave', 'property: material.color; to: #ffffff; startEvents: mouseleave; dur: 200');
      frame.setAttribute('animation__leave_op', `property: material.opacity; to: ${baseOpacity * 0.2}; startEvents: mouseleave; dur: 200`);

      const seed = 1000 + index;
      const imgId = `gallery-img-${index}`;
      
      const nativeImg = document.createElement('img');
      nativeImg.crossOrigin = 'anonymous';
      nativeImg.id = imgId;
      nativeImg.src = `https://loremflickr.com/400/250?lock=${seed}`;
      assetsEl.appendChild(nativeImg); 
      
      const img = document.createElement('a-image');
      img.setAttribute('width', '0.8');
      img.setAttribute('height', '0.5');
      img.setAttribute('position', '0 0 0.01');
      img.setAttribute('src', `#${imgId}`); 
      img.setAttribute('opacity', baseOpacity);
      
      wrapper.dataset.fullSrc = `https://loremflickr.com/1600/1000?lock=${seed}`;
      wrapper.dataset.caption = `Exploration Destination #${index + 1}`;

      wrapper.addEventListener('mouseenter', () => { frame.emit('mouseenter'); img.setAttribute('opacity', '1.0'); });
      wrapper.addEventListener('mouseleave', () => { frame.emit('mouseleave'); img.setAttribute('opacity', baseOpacity); });
      wrapper.addEventListener('click', () => openPhoto(wrapper));

      wrapper.appendChild(frame);
      wrapper.appendChild(img);
      galleryEl.appendChild(wrapper);
    }

    // --- 5. Overlay & UI Logic (Unchanged) ---
    const overlay = document.getElementById('overlay');
    const overlayImg = document.getElementById('overlay-img');
    const overlayCaption = document.getElementById('overlay-caption');
    const camera = document.querySelector('a-camera');

    function openPhoto(el) {
      overlayImg.src = el.dataset.fullSrc;
      overlayCaption.textContent = el.dataset.caption;
      overlay.classList.add('active');
      camera.setAttribute('look-controls', 'enabled', false);
    }

    function closeOverlay() {
      overlay.classList.remove('active');
      camera.setAttribute('look-controls', 'enabled', true);
      setTimeout(() => overlayImg.src = '', 300); 
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
    overlay.addEventListener('click', function(e) { if (e.target === this || e.target.id === 'overlay-caption') closeOverlay(); });
  </script>
</body>
</html>
